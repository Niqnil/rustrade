name: "Publish to crates.io"

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  MOLD_VERSION: "2.35.1"

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install mold linker
        uses: rui314/setup-mold@v1
        with:
          mold-version: ${{ env.MOLD_VERSION }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run cargo fmt check
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D clippy::correctness -D clippy::suspicious -D clippy::style -W clippy::complexity -D clippy::perf

      - name: Run cargo test
        run: cargo test --workspace --all-features --lib --bins --tests

  publish:
    name: Publish crates
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Login to crates.io
        run: cargo login "$CRATES_IO_TOKEN"
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish rustrade-macro
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name=="rustrade-macro") | .version')
          if cargo search rustrade-macro --limit 1 | grep -q "rustrade-macro = \"$VERSION\""; then
            echo "rustrade-macro@$VERSION already published, skipping"
          else
            cargo publish -p rustrade-macro --no-verify
          fi

      - name: Wait for crates.io index
        run: sleep 60

      - name: Publish rustrade-instrument
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name=="rustrade-instrument") | .version')
          if cargo search rustrade-instrument --limit 1 | grep -q "rustrade-instrument = \"$VERSION\""; then
            echo "rustrade-instrument@$VERSION already published, skipping"
          else
            cargo publish -p rustrade-instrument --no-verify
          fi

      - name: Wait for crates.io index
        run: sleep 60

      - name: Publish rustrade-integration
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name=="rustrade-integration") | .version')
          if cargo search rustrade-integration --limit 1 | grep -q "rustrade-integration = \"$VERSION\""; then
            echo "rustrade-integration@$VERSION already published, skipping"
          else
            cargo publish -p rustrade-integration --no-verify
          fi

      - name: Wait for crates.io index
        run: sleep 60

      - name: Publish rustrade-execution
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name=="rustrade-execution") | .version')
          if cargo search rustrade-execution --limit 1 | grep -q "rustrade-execution = \"$VERSION\""; then
            echo "rustrade-execution@$VERSION already published, skipping"
          else
            cargo publish -p rustrade-execution --no-verify
          fi

      - name: Publish rustrade-data
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name=="rustrade-data") | .version')
          if cargo search rustrade-data --limit 1 | grep -q "rustrade-data = \"$VERSION\""; then
            echo "rustrade-data@$VERSION already published, skipping"
          else
            cargo publish -p rustrade-data --no-verify
          fi

      - name: Wait for crates.io index
        run: sleep 60

      - name: Publish rustrade
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name=="rustrade") | .version')
          if cargo search rustrade --limit 1 | grep -q "rustrade = \"$VERSION\""; then
            echo "rustrade@$VERSION already published, skipping"
          else
            cargo publish -p rustrade --no-verify
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

name: "Barter CI"

on:
  push:
    paths-ignore:
      - "**.md"
    branches: ["main", "develop"]
  pull_request:
    paths-ignore:
      - "**.md"
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MOLD_VERSION: "2.35.1"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout sources
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  check:
    name: cargo check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout sources
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install mold linker
        uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878  # v1
        with:
          mold-version: ${{ env.MOLD_VERSION }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: "barter-ci-check"

      - name: Run cargo check
        run: cargo check --workspace --all-targets --all-features

  test:
    name: cargo test
    needs: [fmt, check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout sources
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install mold linker
        uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878  # v1
        with:
          mold-version: ${{ env.MOLD_VERSION }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: "barter-ci-test"

      - name: Run cargo test
        # Exclude examples to avoid mold linker hitting .debug_str section size limits
        run: cargo test --workspace --all-features --lib --bins --tests

  clippy:
    name: cargo clippy
    needs: [fmt, check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout sources
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install mold linker  # Required for proc-macro linking on cache miss
        uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878  # v1
        with:
          mold-version: ${{ env.MOLD_VERSION }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: "barter-ci-check"

      - name: Run cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D clippy::correctness -D clippy::suspicious -D clippy::style -W clippy::complexity -D clippy::perf

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout sources
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # Advisory ignores synced with deny.toml (canonical source for justifications)
      - name: Run cargo audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998  # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2026-0002,RUSTSEC-2026-0097

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout sources
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@a4d2d701318fdc1c6ae17ba8cea8f329c5110eb2  # v2.0.17

# Dependabot configuration for rustrade
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    rebase-strategy: "disabled"
    labels:
      - "dependencies"
    groups:
      rust-patch:
        update-types:
          - "patch"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    rebase-strategy: "disabled"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-patch:
        update-types:
          - "patch"
    commit-message:
      prefix: "ci"
